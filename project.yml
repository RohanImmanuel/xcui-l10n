name: SimpleSettings
options:
  bundleIdPrefix: com.example
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16"

settings:
  base:
    SWIFT_VERSION: "6.0"
    DEVELOPMENT_TEAM: ""

targets:
  SimpleSettings:
    type: application
    platform: iOS
    sources:
      - path: SimpleSettings
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.example.SimpleSettings
        INFOPLIST_FILE: SimpleSettings/Info.plist
    info:
      path: SimpleSettings/Info.plist
      properties:
        CFBundleDisplayName: SimpleSettings
        CFBundleVersion: "1"
        CFBundleShortVersionString: "1.0"
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        CFBundleLocalizations:
          - en
          - es
          - fr

  SimpleSettingsUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: SimpleSettingsUITests
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.example.SimpleSettingsUITests
        TEST_TARGET_NAME: SimpleSettings
    dependencies:
      - target: SimpleSettings
